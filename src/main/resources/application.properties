spring.application.name=shop_stream

# Server
server.port=8081

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/shopstream_orders
spring.datasource.username=shop
spring.datasource.password=shop
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Kafka ? our own custom namespace, NOT spring.kafka.*
kafka.bootstrap-servers=localhost:9092
kafka.topic.orders-placed=orders.placed